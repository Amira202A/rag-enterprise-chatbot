<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">PGH</div>
      <span class="logo-name">SmartBot</span>
    </div>
    <h2>Connexion</h2>
    <p class="subtitle">Connectez-vous avec votre CIN et mot de passe reçu par email</p>
    <div class="alert error" *ngIf="error">{{ error }}</div>
    <div class="form-group">
      <label>CIN</label>
      <input type="text" [(ngModel)]="cin" placeholder="Numéro de carte d'identité" [disabled]="loading"/>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="password" placeholder="Mot de passe reçu par email"
             (keyup.enter)="login()" [disabled]="loading"/>
    </div>
    <button class="btn-primary" (click)="login()" [disabled]="loading">
      {{ loading ? 'Connexion...' : 'Se connecter' }}
    </button>
    <p class="switch-auth">
      Pas encore de compte ?
      <a (click)="goToRegister()">S'inscrire</a>
    </p>
  </div>
</div>
