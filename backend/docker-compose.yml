version: "3.9"

services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_container
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  mongo:
    image: mongo:6
    container_name: mongo_container
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  mysql:
    image: mysql:8
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chatbot_admin
      MYSQL_USER: chatbot
      MYSQL_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: .
    container_name: rag_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data   # ✅ IMPORTANT pour sauvegarde PDF
    depends_on:
      - qdrant
      - ollama
      - mongo
      - mysql
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_URL: http://ollama:11434
      MONGO_URL: mongodb://mongo:27017
    restart: always

volumes:
  qdrant_data:
  ollama_data:
  mongo_data:
  mysql_data: